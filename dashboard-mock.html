  <style>
    :root{--bg:#f4f7fb;--paper:#fff;--line:#d9e3ef;--ink:#12263a;--muted:#5f7082;--a:#0f766e;--b:#1d4ed8;--c:#ea580c;--d:#7c3aed}
    *{box-sizing:border-box} body{margin:0;font-family:"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{width:min(1280px,95vw);margin:18px auto 36px}.hero{background:linear-gradient(120deg,#103451,#1d5f8d);color:#fff;border-radius:14px;padding:16px}
    .hero h1{margin:0;font-size:28px}.hero p{margin:6px 0 0;opacity:.95}
    .tabs{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.14);color:#fff;border-radius:999px;padding:6px 12px;cursor:pointer;font-size:13px}

    .panel{display:none}.panel.active{display:block}
    .kpis{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:9px}.kpi{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:9px}
    .kpi .l{font-size:12px;color:var(--muted)}.kpi .v{font-size:22px;font-weight:700;margin-top:2px}
    .grid{margin-top:12px;display:grid;grid-template-columns:repeat(12,1fr);gap:10px}.card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:10px}
    .c12{grid-column:span 12}.c8{grid-column:span 8}.c6{grid-column:span 6}.c4{grid-column:span 4}
    .card h2{margin:0;font-size:16px}.sub{margin:5px 0 8px;color:var(--muted);font-size:12px}
    canvas{width:100%;height:270px;border:1px solid #edf2f7;border-radius:8px;background:#fcfeff}.small canvas{height:220px}
    table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid var(--line);padding:7px;text-align:left}th{background:#edf3fb}
    .note{margin-top:10px;font-size:13px;background:#fff8ef;border:1px solid #f2dfc4;color:#7a4f14;padding:10px;border-radius:8px}
    .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--muted)}
    .lg{display:inline-flex;align-items:center;gap:6px}
    .sw{width:14px;height:3px;border-radius:2px;display:inline-block}
    .sw.bar{height:10px;opacity:.6}
    @media(max-width:980px){.c12,.c8,.c6,.c4{grid-column:span 12}}
  </style>

function donut(id,a,b,la,lb){const c=document.getElementById(id),ctx=setup(c),w=c.width,h=c.height,cx=w/2,cy=h/2+8,r=78,total=(a+b)||1,ang=(a/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.fillStyle='#1d4ed8';ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+ang);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(cx,cy);ctx.fillStyle='#ea580c';ctx.arc(cx,cy,r,-Math.PI/2+ang,-Math.PI/2+Math.PI*2);ctx.closePath();ctx.fill();ctx.beginPath();ctx.fillStyle='#fff';ctx.arc(cx,cy,40,0,Math.PI*2);ctx.fill();ctx.fillStyle='#334a5d';ctx.fillText(`${la} ${(a/total*100).toFixed(1)}%`,16,20);ctx.fillText(`${lb} ${(b/total*100).toFixed(1)}%`,16,36);}

function kpis(items){return `<section class="kpis">${items.map(i=>`<div class="kpi"><div class="l">${i[0]}</div><div class="v">${i[1]}</div></div>`).join('')}</section>`}
function card(title,sub,body,cls='c6'){return `<article class="card ${cls}"><h2>${title}</h2><div class="sub">${sub||''}</div>${body}</article>`}

function build(){
  const sales=sum(D.base.series.sales), gross=sum(D.base.series.gross), buy=sum(D.base.series.buy), profit=sum(D.base.series.expectedProfit);
  const lowMargin = D.extra.lowMarginCategories || [];
  const c = D.extra.customer || {sales_unique:0,buy_unique:0,overlap:0,sales_only:0,buy_only:0};
  const customerTotal = c.sales_only + c.buy_only + c.overlap;
  const overlapShare = customerTotal ? (c.overlap / customerTotal) * 100 : 0;
  document.getElementById('t1').innerHTML =
    kpis([['販売件数',fmt.format(D.base.kpi.sales_rows)],['買取件数',fmt.format(D.base.kpi.buy_rows)],['販売価格合計',yen(sales)],['粗利合計',yen(gross)],['買取額合計',yen(buy)],['想定利益合計',yen(profit)]])+
    `<div class="grid">`+
    card('月次推移（販売/買取/合計 + 利益内訳）','左軸: 棒(月次の販売利益・買取利益) / 右軸: 折れ線(販売・買取・合計の累積)','<canvas id="t1line" width="860" height="270"></canvas><div class="legend"><span class="lg"><i class="sw" style="background:#0f766e"></i>販売（累積）</span><span class="lg"><i class="sw" style="background:#ea580c"></i>買取（累積）</span><span class="lg"><i class="sw" style="background:#1d4ed8"></i>合計（累積）</span><span class="lg"><i class="sw bar" style="background:rgba(124,58,237,0.60)"></i>販売利益（棒）</span><span class="lg"><i class="sw bar" style="background:rgba(6,182,212,0.60)"></i>買取利益（棒）</span></div>','c8')+
    card('販売/買取 構成比','全体比率','<canvas id="t1donut" width="420" height="220"></canvas>','c4 small')+
    `</div>`;

  document.getElementById('t2').innerHTML =
    kpis([['販売価格合計',yen(sales)],['粗利合計',yen(gross)],['平均販売単価',yen(sales/(D.base.kpi.sales_rows||1))],['粗利率',((gross/sales)*100).toFixed(1)+'%']])+
    `<div class="grid">`+
    card('販売売上・粗利 月次','販売データ特化','<canvas id="t2line" width="860" height="270"></canvas>','c8')+
    card('メーカー Top10','件数','<canvas id="t2maker" width="420" height="220"></canvas>','c4 small')+
    card('カテゴリ Top10','件数','<canvas id="t2cat" width="620" height="220"></canvas>','c6 small')+
    card('販売部門 Top8','件数','<canvas id="t2ch" width="620" height="220"></canvas>','c6 small')+
    `</div>`;

  document.getElementById('t3').innerHTML =
    kpis([['買取件数',fmt.format(D.base.kpi.buy_rows)],['買取額合計',yen(buy)],['想定利益合計',yen(profit)],['想定利益率',((profit/buy)*100).toFixed(1)+'%']])+
    `<div class="grid">`+
    card('買取額・想定利益 月次','買取データ特化','<canvas id="t3line" width="860" height="270"></canvas>','c8')+
    card('買取店舗 別件数','コード別','<canvas id="t3store" width="420" height="220"></canvas>','c4 small')+
    card('買取方法 別件数','コード別','<canvas id="t3method" width="620" height="220"></canvas>','c6 small')+
    card('買取月次サマリー','件数/金額/利益','<table id="t3tbl"><thead><tr><th>月</th><th>件数</th><th>買取額</th><th>想定利益</th></tr></thead><tbody></tbody></table>','c6')+
    `</div>`;

  document.getElementById('t4').innerHTML =
    kpis([['販売ユニーク顧客',fmt.format(D.extra.customer.sales_unique)],['買取ユニーク顧客',fmt.format(D.extra.customer.buy_unique)],['顧客重複数',fmt.format(D.extra.customer.overlap)],['重複率',((D.extra.customer.overlap/(D.extra.customer.sales_unique||1))*100).toFixed(2)+'%']])+
    `<div class="grid">`+
    card('リードタイム分布','仕入〜販売日差のバケット','<canvas id="t4lead" width="620" height="220"></canvas>','c6 small')+
    card('地域別販売額 Top15','都道府県別','<canvas id="t4sales" width="620" height="220"></canvas>','c6 small')+
    card('地域別買取額 Top15','都道府県別','<canvas id="t4buy" width="620" height="220"></canvas>','c6 small')+
    card('顧客区分内訳','販売のみ / 買取のみ / 両方','<canvas id="t4seg" width="620" height="220"></canvas>','c6 small')+
    `</div>`;

  document.getElementById('t5').innerHTML =
    kpis([['エアコン受注',fmt.format(D.ac.kpi.ac_orders)],['工事セット受注',fmt.format(D.ac.kpi.set_orders)],['セット率',D.ac.kpi.set_rate + '%'],['エアコン売上',yen(D.ac.kpi.ac_sales)],['工事売上',yen(D.ac.kpi.install_sales)]])+
    `<div class="grid">`+
    card('セット率トレンド','月次セット率(%)','<canvas id="t5rate" width="860" height="270"></canvas>','c8')+
    card('同時購入カテゴリ Top','エアコン同時購入','<canvas id="t5co" width="420" height="220"></canvas>','c4 small')+
    card('販売部門別 セット率','提案強化優先度','<canvas id="t5ch" width="620" height="220"></canvas>','c6 small')+
    card('都道府県別 セット率','地域別浸透度','<canvas id="t5pref" width="620" height="220"></canvas>','c6 small')+
    card('提案機会リスト','目標セット率40%との差分ベース','<table id="t5tbl"><thead><tr><th>販売部門</th><th>受注</th><th>セット率</th><th>追加見込セット件数</th></tr></thead><tbody></tbody></table>','c12')+
    `</div>`;

  document.getElementById('t6').innerHTML =
    kpis([['販売カテゴリTop10件数',fmt.format(sum((D.base.topSalesCategories||[]).map(x=>x.value)))],['主要メーカーTop10件数',fmt.format(sum((D.base.topSalesMakers||[]).map(x=>x.value)))],['低粗利カテゴリ候補',fmt.format(lowMargin.length)],['低粗利カテゴリ売上合計',yen(sum(lowMargin.map(x=>x.sales||0)))],['低粗利カテゴリ平均粗利率',(lowMargin.length?(sum(lowMargin.map(x=>x.rate||0))/lowMargin.length):0).toFixed(2)+'%']])+
    `<div class="grid">`+
    card('商品カテゴリ Top10','件数','<canvas id="t6cat" width="620" height="220"></canvas>','c6 small')+
    card('メーカー Top10','件数','<canvas id="t6maker" width="620" height="220"></canvas>','c6 small')+
    card('低粗利カテゴリ Top12','粗利率(%)','<canvas id="t6low" width="620" height="220"></canvas>','c6 small')+
    card('メーカーポートフォリオ Top10','売上規模(円)','<canvas id="t6portfolio" width="620" height="220"></canvas>','c6 small')+
    card('商品重点管理リスト','カテゴリ別: 件数/粗利率/売上','<table id="t6tbl"><thead><tr><th>カテゴリ</th><th>件数</th><th>粗利率</th><th>売上</th></tr></thead><tbody></tbody></table>','c12')+
    `</div>`;

  document.getElementById('t7').innerHTML =
    kpis([['販売ユニーク顧客',fmt.format(c.sales_unique)],['買取ユニーク顧客',fmt.format(c.buy_unique)],['販売のみ顧客',fmt.format(c.sales_only)],['買取のみ顧客',fmt.format(c.buy_only)],['両方実績顧客',fmt.format(c.overlap)],['重複率（全体）',overlapShare.toFixed(2)+'%']])+
    `<div class="grid">`+
    card('顧客セグメント構成','販売のみ / 買取のみ の構成比','<canvas id="t7seg" width="620" height="220"></canvas>','c6 small')+
    card('買取件数 月次推移','顧客接点ボリュームの推移','<canvas id="t7count" width="620" height="220"></canvas>','c6 small')+
    card('地域別 販売/買取 比率 Top15','高いほど販売寄り','<canvas id="t7ratio" width="620" height="220"></canvas>','c6 small')+
    card('地域別 売上/買取 金額比較 Top15','顧客活動量の地域差','<canvas id="t7activity" width="620" height="220"></canvas>','c6 small')+
    card('顧客セグメント一覧','分析用サマリー','<table id="t7tbl"><thead><tr><th>区分</th><th>人数</th><th>構成比</th></tr></thead><tbody></tbody></table>','c12')+
    `</div>`;
}

function render(){
  const salesCum=[]; let srun=0;
  const buyCum=[]; let brun=0;
  const totalCum=[];
  for(let i=0;i<D.base.months.length;i++){srun+=(D.base.series.sales[i]||0); brun+=(D.base.series.buy[i]||0); salesCum.push(srun); buyCum.push(brun); totalCum.push(srun+brun);}
  comboLineBar('t1line',D.base.months,[{data:D.base.series.gross,color:'rgba(124,58,237,0.60)'},{data:D.base.series.expectedProfit,color:'rgba(6,182,212,0.60)'}],[{data:salesCum,color:'#0f766e'},{data:buyCum,color:'#ea580c'},{data:totalCum,color:'#1d4ed8'}]);
  donut('t1donut',sum(D.base.series.sales),sum(D.base.series.buy),'販売','買取');

  line('t2line',D.base.months,[{data:D.base.series.sales,color:'#1d4ed8'},{data:D.base.series.gross,color:'#0f766e'}]);
  hbar('t2maker',D.base.topSalesMakers,'#ea580c',170); hbar('t2cat',D.base.topSalesCategories,'#1d4ed8',170); hbar('t2ch',D.base.topSalesChannels,'#0f766e',230);

  line('t3line',D.extra.buyMonthly.months,[{data:D.extra.buyMonthly.buy,color:'#ea580c'},{data:D.extra.buyMonthly.profit,color:'#7c3aed'}]);
  hbar('t3store',D.base.buyStores,'#1d4ed8',120); hbar('t3method',D.base.buyMethods,'#0f766e',120);
  const tb=document.querySelector('#t3tbl tbody'); D.extra.buyMonthly.months.forEach((m,i)=>{const tr=document.createElement('tr'); tr.innerHTML=`<td>${m}</td><td>${fmt.format(D.extra.buyMonthly.count[i])}</td><td>${yen(D.extra.buyMonthly.buy[i])}</td><td>${yen(D.extra.buyMonthly.profit[i])}</td>`; tb.appendChild(tr);});

  hbar('t4lead',D.extra.lead.bucket,'#7c3aed',140);
  hbar('t4sales',D.extra.prefCompare.map(x=>({name:x.name,value:x.sales})),'#1d4ed8',120);
  hbar('t4buy',D.extra.prefCompare.map(x=>({name:x.name,value:x.buy})),'#ea580c',120);
  donut('t4seg',D.extra.customer.sales_only,D.extra.customer.buy_only,'販売のみ','買取のみ');

  line('t5rate',D.ac.months,[{data:D.ac.monthSeries.setRate,color:'#ea580c'}]);
  hbar('t5co',D.ac.coTop.map(x=>({name:x.name,value:x.value})),'#7c3aed',150);
  hbar('t5ch',D.ac.channelStats.slice(0,10).map(x=>({name:x.name,value:x.set_rate})),'#0f766e',230);
  hbar('t5pref',D.ac.prefStats.slice(0,12).map(x=>({name:x.name,value:x.set_rate})),'#1d4ed8',120);
  const tb5=document.querySelector('#t5tbl tbody'); D.ac.opportunities.slice(0,10).forEach(r=>{const tr=document.createElement('tr'); tr.innerHTML=`<td>${r.channel}</td><td>${fmt.format(r.ac_orders)}</td><td>${r.set_rate}%</td><td>${fmt.format(r.est_additional_sets)}</td>`; tb5.appendChild(tr);});

  hbar('t6cat',D.base.topSalesCategories,'#1d4ed8',170);
  hbar('t6maker',D.base.topSalesMakers,'#ea580c',170);
  hbar('t6low',(D.extra.lowMarginCategories||[]).map(x=>({name:x.name,value:x.rate})),'#7c3aed',190);
  hbar('t6portfolio',(D.extra.portfolioMakers||[]).slice(0,10).map(x=>({name:x.name,value:x.size})),'#0f766e',170);
  const tb6=document.querySelector('#t6tbl tbody'); (D.extra.lowMarginCategories||[]).forEach(r=>{const tr=document.createElement('tr'); tr.innerHTML=`<td>${r.name}</td><td>${fmt.format(r.count)}</td><td>${r.rate}%</td><td>${yen(r.sales)}</td>`; tb6.appendChild(tr);});

  const c = D.extra.customer || {sales_unique:0,buy_unique:0,overlap:0,sales_only:0,buy_only:0};
  const customerTotal = c.sales_only + c.buy_only + c.overlap;
  donut('t7seg',c.sales_only,c.buy_only,'販売のみ','買取のみ');
  line('t7count',D.extra.buyMonthly.months,[{data:D.extra.buyMonthly.count,color:'#0f766e'}]);
  hbar('t7ratio',D.extra.prefCompare.slice(0,15).map(x=>({name:x.name,value:x.ratio})),'#7c3aed',120);
  hbar('t7activity',D.extra.prefCompare.slice(0,15).map(x=>({name:x.name,value:x.sales+x.buy})),'#1d4ed8',120);
  const tb7=document.querySelector('#t7tbl tbody');
  [
    {name:'販売のみ',count:c.sales_only},
    {name:'買取のみ',count:c.buy_only},
    {name:'両方',count:c.overlap}
  ].forEach(r=>{
    const ratio = customerTotal ? (r.count/customerTotal*100).toFixed(2)+'%' : '0.00%';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${r.name}</td><td>${fmt.format(r.count)}</td><td>${ratio}</td>`;
    tb7.appendChild(tr);
  });
}

function bindTabs(){document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(b.dataset.id).classList.add('active');}));}

build(); bindTabs(); render();
</script>
</body>
</html>
